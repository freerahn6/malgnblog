# blog.malgnsoft.com — 정적 서빙 + GitHub 웹훅 엔드포인트
# 설치: /etc/nginx/sites-available/blog.malgnsoft.com 에 복사 후 sites-enabled 로 심볼릭 링크
#
# 주의: SSL 인증서 발급 전에는 아래 443 블록이 없는 상태로 80만 띄우고
#       certbot --nginx 를 돌린 뒤 이 설정으로 교체하는 것이 편합니다.

server {
    listen 80;
    listen [::]:80;
    server_name blog.malgnsoft.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name blog.malgnsoft.com;

    ssl_certificate     /etc/letsencrypt/live/blog.malgnsoft.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.malgnsoft.com/privkey.pem;

    # cron이 2분마다 이 디렉터리를 갱신한다(설치가이드 3-3 참고)
    root /var/www/blog;
    index index.html;

    charset utf-8;
    gzip on;
    gzip_types text/css text/javascript application/javascript application/xml text/plain;
    gzip_min_length 1024;

    # 저장소 메타데이터 노출 차단(rsync에서 제외하지만 이중으로 막아둔다)
    location ~ /\.git { deny all; return 404; }

    # ---- 조회수 수집 엔드포인트 (미구현) ----
    # 페이지마다 POST /api/track 을 호출한다. Netlify Functions에 있던 기능으로,
    # 자체서버에는 아직 대체 구현이 없다. 204로 조용히 받아 404 로그·콘솔 오류만 막는다.
    # 통계가 필요해지면 이 자리에 실제 수집기를 연결할 것.
    location = /api/track { return 204; }

    # 페이지는 항상 최신을 보여준다(빌드가 자주 바뀌므로)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-cache";
    }

    # data URI로 자산이 인라인되어 있어 정적 파일은 사실상 문서뿐이다
    location ~* \.(xml|txt)$ {
        expires 1h;
    }

    access_log /var/log/nginx/blog.access.log;
    error_log  /var/log/nginx/blog.error.log;
}
