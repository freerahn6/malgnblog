# blog.malgnsoft.com — Apache 2.4 (Rocky Linux 9) 가상호스트
#
# 설치: /etc/httpd/conf.d/blog.malgnsoft.com.conf 로 복사 → `apachectl configtest` → `systemctl reload httpd`
#
# 역할 분담
#   Apache — 사이트 본문(정적 HTML·XML·TXT) 직접 서빙
#   Resin  — /api/track·/api/stats(조회수) + /api/update(프로그램 갱신 버튼) 담당
#
# 주의: SSL 인증서 발급 전에는 아래 443 블록을 지운 채 80만 띄우고
#       `certbot --apache` 를 돌린 뒤 이 파일로 교체하는 편이 수월합니다.

# ─────────────────────────────────────────────────────────────
# 문서 루트 접근 정책 (경로 기준이라 이 사이트에만 적용됩니다)
# ─────────────────────────────────────────────────────────────
<Directory "/home/blog/public_html">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# 서블릿 컨테이너 영역은 Apache가 절대 노출하면 안 됩니다.
# (Resin은 자체적으로 막지만, Apache는 정적 파일로 먼저 읽어버리므로 명시 차단)
<DirectoryMatch "^/home/blog/public_html/WEB-INF">
    Require all denied
</DirectoryMatch>

# 관리자 비밀번호가 쿼리스트링(?pw=)으로 오가므로, 이 사이트의 접근 로그에는
# 쿼리스트링을 남기지 않습니다. combined 를 쓰면 %r 안에 평문으로 쌓입니다.
LogFormat "%h %l %u %t \"%m %U %H\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" blog_noquery

<VirtualHost *:80>
    ServerName blog.malgnsoft.com
    DocumentRoot "/home/blog/public_html"

    # certbot 갱신 경로만 열어두고 나머지는 HTTPS로 보냅니다.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]

    ErrorLog  /var/log/httpd/blog.error.log
    CustomLog /var/log/httpd/blog.access.log blog_noquery
</VirtualHost>

<VirtualHost *:443>
    ServerName blog.malgnsoft.com
    DocumentRoot "/home/blog/public_html"

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/blog.malgnsoft.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/blog.malgnsoft.com/privkey.pem

    DirectoryIndex index.html index.jsp
    AddDefaultCharset UTF-8

    # ── 조회수 수집 + 프로그램 갱신 → Resin ────────────────
    # 방식 A(기본): mod_proxy로 Resin의 HTTP 포트에 넘깁니다. 추가 모듈이 필요 없습니다.
    #   Resin의 http 포트가 8080이 아니면 아래 포트를 맞춰주세요(resin.xml의 <http port="..."/>).
    #
    #   ProxyPreserveHost On 은 필수입니다 — 빼면 Resin에 Host: 127.0.0.1 이 전달되어
    #   <host id="blog.malgnsoft.com"> 이 아닌 기본 호스트로 라우팅되고 /api/*가 404가 됩니다.
    ProxyPreserveHost On
    #   /api/update(프로그램 갱신)는 git fetch가 도는 동안 응답이 늦으므로 타임아웃을 넉넉히 둡니다.
    #   더 구체적인 규칙을 먼저 써야 합니다(아래 track/stats 규칙보다 위).
    ProxyPass        /api/update  http://127.0.0.1:8080/api/update  retry=0 timeout=90
    ProxyPassReverse /api/update  http://127.0.0.1:8080/api/update
    ProxyPass        /api/  http://127.0.0.1:8080/api/  retry=1 timeout=5
    ProxyPassReverse /api/  http://127.0.0.1:8080/api/
    #
    # 방식 B: 이 서버가 이미 mod_caucho로 Apache↔Resin을 붙여 쓰고 있다면
    #         위 ProxyPass 두 줄을 지우고 아래를 사용하세요.
    # <Location /api/>
    #     SetHandler caucho-request
    # </Location>

    # JSP는 이 사이트에서 쓰지 않지만, 실수로 놓인 파일이 소스째 노출되는 것은 막습니다.
    <FilesMatch "\.(jsp|jspf|jspx)$">
        Require all denied
    </FilesMatch>

    # ── 캐시 정책 ────────────────────────────────────────
    # 빌드가 자주 바뀌므로 문서는 항상 최신을 확인하게 합니다.
    <IfModule mod_headers.c>
        <FilesMatch "\.html$">
            Header set Cache-Control "no-cache"
        </FilesMatch>
        <FilesMatch "\.(xml|txt)$">
            Header set Cache-Control "public, max-age=3600"
        </FilesMatch>
    </IfModule>

    # 이미지는 HTML 안에 data URI로 인라인되어 있어 정적 자산은 사실상 문서뿐입니다.
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css text/xml \
                                      application/javascript application/xml application/json
    </IfModule>

    ErrorLog  /var/log/httpd/blog.error.log
    CustomLog /var/log/httpd/blog.access.log blog_noquery
</VirtualHost>
